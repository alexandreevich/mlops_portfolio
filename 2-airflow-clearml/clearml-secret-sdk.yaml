apiVersion: v1
kind: Secret
metadata:
  name: clearml-secret-sdk
  namespace: r-mlops-k8s-8-1-11-854415502
stringData:
  clearml.conf: |-
    agent {
        git_user: "gitlab"
        git_pass: "***"
        }
    sdk {
      aws {
          s3 {
              region: "ru-central1"
              host: "storage.yandexcloud.net:443"
              key: "***"
              secret: "***"
              credentials: [
                  {
                      bucket: "r-mlops-bucket-8-1-11-854415502"
                      secure: true
                  }
              ]
          }
          boto3 {
              pool_connections: 512
              max_multipart_concurrency: 16
              multipart_threshold: 8388608 # 8MB
              multipart_chunksize: 8388608 # 8MB
          }
      }

      development {
          default_output_uri: "s3://storage.yandexcloud.net:443/r-mlops-bucket-8-1-11-854415502"
      }
    }
    environment {
      AWS_ACCESS_KEY_ID: "***"
      AWS_SECRET_ACCESS_KEY: "***"
      }