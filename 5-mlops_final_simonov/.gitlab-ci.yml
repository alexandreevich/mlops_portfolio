# Использовался скрепный buildkit
build-rootless:
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  stage: build

  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
    TAG: "latest"
    IMAGE: fastapi-app
    DOCKER_REGISTRY: "mlops.gitlab.yandexcloud.net:5050"
    DOCKER_IMAGE: "${DOCKER_REGISTRY}/s14151511/mlops_final_simonov/${IMAGE}:${TAG}"

  before_script:
    - mkdir -p ~/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=. \
          --opt oci-mediatypes=true \
          --opt compression=zstd \
          --opt compression-level=3 \
          --opt force-compression=true \
          --output type=image,name=$CI_REGISTRY_IMAGE:latest,push=true
