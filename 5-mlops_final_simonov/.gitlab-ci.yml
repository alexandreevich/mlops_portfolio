#Так как через kserve не завелось, пришлось костылить
load_model:
  stage: train
  <<: *setup_venv
  script:
    - export AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID
    - export AWS_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY
    - aws s3 cp s3://r-mlops-bucket-12-1-1-854415502/best_model/ranker.pkl . --endpoint-url $S3_ENDPOINT_URL
    - aws s3 cp s3://r-mlops-bucket-12-1-1-854415502/transformed_data/item_features.parquet . --endpoint-url $S3_ENDPOINT_URL
  artifacts:
    paths:
      - ranker.pkl
      - item_features.parquet
    expire_in: 20 minutes
  retry:
    max: 2



