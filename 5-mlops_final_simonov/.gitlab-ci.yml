default:
  tags: [k8s]
  image: python:3.12-bookworm

# Локальные переменные для работы манифеста.
variables:
  VENV_PATH: "$CI_PROJECT_DIR/.venv"
  PYTHON_VERSION: "3.12"
  S3_BUCKET_NAME: "r-mlops-bucket-12-1-1-418299928"
  S3_ENDPOINT_URL: "https://storage.yandexcloud.net"
  AWS_DEFAULT_REGION: "ru-central1"

stages:
  - lint
  - prepare_data
  - train
  - test
  - build
  - save
  - release
  
 #Якорь с установкой и активацией окружения
.setup_venv: &setup_venv
  before_script:
    - export PATH="$HOME/.local/bin:$VENV_PATH/bin:$PATH"
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export UV_LINK_MODE=copy
    - uv venv --python $PYTHON_VERSION $VENV_PATH
    - source $VENV_PATH/bin/activate
    - uv pip install -r requirements.txt

linter:
  stage: lint
  <<: *setup_venv
  script:
    - ruff check . # Запускаем линтер

formater:
  stage: lint
  <<: *setup_venv
  script:
    - ruff format --check . # Запускам форматтер

mypy_check:
  stage: lint
  <<: *setup_venv
  script:
    - mypy . --explicit-package-bases # Запускаем статическую проверку типов


