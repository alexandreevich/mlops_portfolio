default:
  tags: [k8s]
  image: python:3.12-bookworm

# Локальные переменные для работы манифеста.
variables:
  VENV_PATH: "$CI_PROJECT_DIR/.venv"
  PYTHON_VERSION: "3.12"

stages:
  - lint
  - test
  - train
  - build
  - save
  - release

 #Якорь с установкой и активацией окружения
.setup_venv: &setup_venv
  before_script:
    - export PATH="$HOME/.local/bin:$VENV_PATH/bin:$PATH"
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export UV_LINK_MODE=copy
    - uv venv --python $PYTHON_VERSION $VENV_PATH
    - source $VENV_PATH/bin/activate
    - uv pip install -r requirements.txt

linter:
  stage: lint
  <<: *setup_venv
  script:
    - ruff check . # Запускаем линтер

formater:
  stage: lint
  <<: *setup_venv
  script:
    - ruff format --check . # Запускам форматтер

mypy_check:
  stage: lint
  <<: *setup_venv
  script:
    - mypy . # Запускаем статическую проверку типов

pytest:
  stage: test
  <<: *setup_venv
  script:
    - pytest . # Запускаем тесты

train_model:
  stage: train
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  <<: *setup_venv
  script:
    - cd src/service
    - python3 train_and_save_model.py
    - mv model.pkl $CI_PROJECT_DIR/model.pkl
  artifacts: # Сохраняем артефакт работы джобы с обучением в виде файла model.pkl
    paths:
      - model.pkl
    expire_in: 15 minutes
  retry: # Перезапускаем джобу если были какие-либо проблемы
    max: 2

cloud_saving:
  stage: save
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  dependencies:
    - train_model
  before_script:
    - pip install awscli~=1.42.16
  script:
    - export AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID
    - export AWS_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY
    - aws s3 cp model.pkl s3://$S3_BUCKET_NAME/$BUCKET_NAME_MODEL/model.pkl --endpoint-url $S3_ENDPOINT_URL
  retry: # Если будут сетевые проблемы, скрипт запустится ещё раз
    max: 2 


deploy_to_production:
  stage: release
  dependencies: 
    - cloud_saving  
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
  before_script:
    - pip install awscli~=1.42.16
    - mkdir -p ~/.ssh
    # Декодируем приватный ключ из base64
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    # Запускаем ssh-agent и добавляем ключ
    - eval $(ssh-agent -s)
    - ssh-add ~/.ssh/id_ed25519
    # Добавляем отпечаток хоста
    - ssh-keyscan -t ecdsa -H "$REMOTE_SERVER_IP" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - export AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY_ID
    - export AWS_SECRET_ACCESS_KEY=$S3_SECRET_ACCESS_KEY
    - aws s3 cp s3://$S3_BUCKET_NAME/$BUCKET_NAME_MODEL/model.pkl ./model.pkl --endpoint-url $S3_ENDPOINT_URL
    - ls -la

    # Копируем архив в /tmp/
    - scp model.pkl $REMOTE_LOGIN@$REMOTE_SERVER_IP:/tmp/
    - scp deploy.sh $REMOTE_LOGIN@$REMOTE_SERVER_IP:/tmp/
    - scp requirements.txt $REMOTE_LOGIN@$REMOTE_SERVER_IP:/tmp/
    - scp src/service/main.py $REMOTE_LOGIN@$REMOTE_SERVER_IP:/tmp/
    - scp src/service/schemas.py $REMOTE_LOGIN@$REMOTE_SERVER_IP:/tmp/
    - scp src/service/predictor.py $REMOTE_LOGIN@$REMOTE_SERVER_IP:/tmp/



    
    - ssh $REMOTE_LOGIN@$REMOTE_SERVER_IP "
        ls -la /tmp" 

    # Запускаем deploy.sh из временной директории
    - ssh $REMOTE_LOGIN@$REMOTE_SERVER_IP "
      cd /tmp ;
      chmod +x deploy.sh ;
      ./deploy.sh '$CI_PROJECT_NAME' '$CI_COMMIT_SHORT_SHA' '$WORKING_DIR'"
       
    - echo "Your application are available at $REMOTE_SERVER_IP"
  # after_script:
  #   # Очищаем временные файлы (можно закомментировать для отладки)
  #   - ssh $REMOTE_LOGIN@$REMOTE_SERVER_IP "
  #       rm -f /tmp/model.pkl ;
  #       rm -rf /tmp/${CI_PROJECT_NAME}_${CI_COMMIT_SHORT_SHA}
  #     "